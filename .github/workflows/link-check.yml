name: Link Check

# Checks external links in the built site. Internal links are already
# validated at build time (onBrokenLinks / onBrokenMarkdownLinks: throw),
# so this focuses on catching rotted external URLs in the notes.
on:
  schedule:
    - cron: "0 3 * * 1" # Every Monday 03:00 UTC
  workflow_dispatch: {}

jobs:
  link-check:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build website
        run: yarn build

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Exclude every internal link (the site's baseUrl is /til/, so all
          # internal links start with /til) — those are already validated at
          # build time and can't be resolved against local files. This check
          # is only for external dead links.
          #   --exclude-all-private: skip localhost / private IPs pasted in notes
          #   --accept 403: academic/publisher sites (doi.org, medium, ACM,
          #     researchgate, arm developer...) return 403 to bots, not real 404s
          #   --accept 429: rate limited, treated as alive
          args: >-
            --exclude "^/til"
            --exclude-all-private
            --no-progress
            --max-concurrency 8
            --max-retries 2
            --accept 200,206,403,429
            "build/**/*.html"
          fail: true
